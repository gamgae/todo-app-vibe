<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXE MATCH</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --line: #e3e0da;
      --text: #1a1a1a;
      --text-muted: #8a8580;
      --accent: #1a1a1a;
      --radius: 2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 80px 24px 120px;
    }

    .container { width: 100%; max-width: 620px; }

    .header { text-align: center; margin-bottom: 48px; }
    .header .eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 500;
      letter-spacing: 6px;
      color: var(--text);
      line-height: 1;
    }
    .header .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--text-muted);
      margin-top: 14px;
    }

    .mode-row {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 48px;
      border-bottom: 1px solid var(--line);
    }
    .mode-btn {
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      padding: 12px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -1px;
    }
    .mode-btn.active { color: var(--text); border-bottom-color: var(--text); }

    .quiz-progress { display: flex; gap: 8px; justify-content: center; margin-bottom: 40px; }
    .quiz-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--line); transition: background 0.2s; }
    .quiz-dot.done { background: var(--text-muted); }
    .quiz-dot.current { background: var(--text); }

    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 56px 44px;
      text-align: center;
    }
    .quiz-question {
      font-family: 'Cormorant Garamond', serif;
      font-size: 27px;
      font-weight: 400;
      margin-bottom: 36px;
      line-height: 1.4;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 1px; }
    .quiz-option {
      background: transparent;
      border: 1px solid var(--line);
      padding: 17px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      margin-top: -1px;
    }
    .quiz-option:hover { background: var(--bg); border-color: var(--text); position: relative; z-index: 1; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--text);
      padding: 56px 44px;
      text-align: center;
    }
    .result-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .result-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 400;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .result-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .result-section { text-align: left; margin-top: 28px; padding-top: 28px; border-top: 1px solid var(--line); }
    .result-section h4 {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-transform: uppercase;
      font-weight: 400;
    }
    .result-section p { font-size: 14px; line-height: 1.75; color: var(--text); font-weight: 300; }
    .result-colors { display: flex; gap: 10px; margin-top: 8px; justify-content: center; }
    .color-swatch { width: 20px; height: 20px; border: 1px solid var(--line); }
    .retry-btn {
      margin-top: 32px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--text-muted);
      padding: 4px 0;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
    }
    .retry-btn:hover { color: var(--text); border-color: var(--text); }

    .browse-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); }
    .brand-card {
      background: var(--surface);
      padding: 24px 22px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .brand-card:hover { background: var(--bg); }
    .brand-card .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; margin-bottom: 6px; }
    .brand-card .brand-mood { font-size: 10px; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; }
    .brand-card .brand-colors { display: flex; gap: 5px; margin-top: 14px; }
    .brand-card .mini-swatch { width: 11px; height: 11px; border: 1px solid var(--line); }

    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,26,26,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 10;
    }
    .detail-overlay.open { display: flex; }
    .detail-card {
      background: var(--surface);
      border: 1px solid var(--text);
      padding: 48px 40px;
      max-width: 460px;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      text-align: center;
    }
    .detail-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      line-height: 1;
    }
    .detail-close:hover { color: var(--text); }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 48px;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-decoration: none;
      text-transform: uppercase;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="eyebrow">Curated for you</div>
      <h1>LUXE MATCH</h1>
      <p class="subtitle">당신의 취향에 맞는 브랜드와 시그니처를 찾아드립니다</p>
    </div>

    <div class="mode-row">
      <button class="mode-btn active" data-mode="quiz">스타일 진단</button>
      <button class="mode-btn" data-mode="browse">브랜드 둘러보기</button>
    </div>

    <div id="quizView">
      <div class="quiz-progress" id="quizProgress"></div>
      <div class="quiz-card" id="quizCard"></div>
    </div>

    <div id="resultView" style="display:none;"></div>

    <div id="browseView" style="display:none;">
      <div class="browse-grid" id="browseGrid"></div>
    </div>

    <a href="../" class="back-link">← 앱 목록으로 돌아가기</a>
  </div>

  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-card" id="detailCard"></div>
  </div>

  <script>

    const detailOverlay = document.getElementById('detailOverlay');
    const detailCard = document.getElementById('detailCard');

    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      if (mode === 'quiz') {
        quizView.style.display = 'block';
        resultView.style.display = 'none';
        browseView.style.display = 'none';
      } else {
        quizView.style.display = 'none';
        resultView.style.display = 'none';
        browseView.style.display = 'block';
        renderBrowse();
      }
    }

    function renderQuiz() {
      quizProgress.innerHTML = QUIZ_QUESTIONS.map((_, i) => {
        const cls = i < quizIndex ? 'done' : (i === quizIndex ? 'current' : '');
        return `<div class="quiz-dot ${cls}"></div>`;
      }).join('');

      const q = QUIZ_QUESTIONS[quizIndex];
      quizCard.innerHTML = `
        <div class="quiz-question">${q.question}</div>
        <div class="quiz-options">
          ${q.options.map((opt, i) => `<div class="quiz-option" data-opt="${i}">${opt.text}</div>`).join('')}
        </div>
      `;
    }

    function answerQuiz(optIndex) {
      const q = QUIZ_QUESTIONS[quizIndex];
      const selected = q.options[optIndex];
      selected.moods.forEach(m => moodScores[m] += 1);

      quizIndex++;
      if (quizIndex < QUIZ_QUESTIONS.length) {
        renderQuiz();
      } else {
        showResult();
      }
    }

    function showResult() {
      quizView.style.display = 'none';

      const topMood = Object.entries(moodScores).sort((a, b) => b[1] - a[1])[0][0];
      const matched = BRANDS.filter(b => b.moods.includes(topMood));
      const pick = matched.length > 0
        ? matched[Math.floor(Math.random() * matched.length)]
        : BRANDS[Math.floor(Math.random() * BRANDS.length)];

      resultView.innerHTML = `
        <div class="result-card">
          <div class="result-label">당신의 스타일은 ${MOOD_LABELS[topMood]}</div>
          <div class="result-brand">${pick.kr}</div>
          <div class="result-tagline">${pick.tagline}</div>
          <div class="result-colors">
            ${pick.colors.map(c => `<div class="color-swatch" style="background:${c}"></div>`).join('')}
          </div>
          <div class="result-section">
            <h4>헤리티지</h4>
            <p>${pick.heritage}</p>
          </div>
          <div class="result-section">
            <h4>디자인 철학</h4>
            <p>${pick.philosophy}</p>
          </div>
          <div class="result-section">
            <h4>시그니처 아이템</h4>
            <p>${pick.signature}</p>
          </div>
          <button class="retry-btn" id="retryBtn">다시 진단하기</button>
        </div>
      `;
      resultView.style.display = 'block';
    }

    function resetQuiz() {
      quizIndex = 0;
      moodScores = { classic: 0, modern: 0, bold: 0, minimal: 0, edgy: 0 };
      resultView.style.display = 'none';
      quizView.style.display = 'block';
      renderQuiz();
    }

    function renderBrowse() {
      browseGrid.innerHTML = BRANDS.map((b, i) => `
        <div class="brand-card" data-brand="${i}">
          <div class="brand-name">${b.kr}</div>
          <div class="brand-mood">${b.moods.map(m => MOOD_LABELS[m]).join(' · ')}</div>
          <div class="brand-colors">
            ${b.colors.map(c => `<div class="mini-swatch" style="background:${c}"></div>`).join('')}
          </div>
        </div>
      `).join('');
    }

    function openDetail(brandIdx) {
      const b = BRANDS[brandIdx];
      detailCard.innerHTML = `
        <button class="detail-close" id="detailCloseBtn">×</button>
        <div class="result-label">${b.name}</div>
        <div class="result-brand">${b.kr}</div>
        <div class="result-tagline">${b.tagline}</div>
        <div class="result-colors">
          ${b.colors.map(c => `<div class="color-swatch" style="background:${c}"></div>`).join('')}
        </div>
        <div class="result-section">
          <h4>헤리티지</h4>
          <p>${b.heritage}</p>
        </div>
        <div class="result-section">
          <h4>디자인 철학</h4>
          <p>${b.philosophy}</p>
        </div>
        <div class="result-section">
          <h4>시그니처 아이템</h4>
          <p>${b.signature}</p>
        </div>
      `;
      detailOverlay.classList.add('open');
    }

    function closeDetail() {
      detailOverlay.classList.remove('open');
    }

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => switchMode(btn.dataset.mode));
    });

    quizCard.addEventListener('click', (e) => {
      const opt = e.target.closest('[data-opt]');
      if (opt) answerQuiz(Number(opt.dataset.opt));
    });

    resultView.addEventListener('click', (e) => {
      if (e.target.id === 'retryBtn') resetQuiz();
    });

    browseGrid.addEventListener('click', (e) => {
      const card = e.target.closest('[data-brand]');
      if (card) openDetail(Number(card.dataset.brand));
    });

    detailOverlay.addEventListener('click', (e) => {
      if (e.target === detailOverlay || e.target.id === 'detailCloseBtn') closeDetail();
    });

    renderQuiz();
  </script>
</body>
</html>
