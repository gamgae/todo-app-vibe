      gap: 0;
      margin-bottom: 48px;

      border: none;

      padding: 12px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);

      font-size: 14px;
      font-weight: 300;
      color: var(--text);

      transition: all 0.15s;
      text-align: left;
      margin-top: -1px;

      text-align: left;

      text-transform: uppercase;

          { text: '이것저것 컬러풀하게', swatch: '#C8642A', axes: { tone: 2 } }
        ]
      },
      {
        question: '10년 넘게 쓴 물건이 낡았어요. 어떻게 하세요?',
        note: '',
        options: [
          { text: '수선해서 계속 써요', axes: { time: -2, daily: 1 } },
          { text: '똑같은 걸 다시 사요', axes: { time: -1 } },
          { text: '이참에 다른 스타일로 바꿔요', axes: { time: 1 } },
          { text: '요즘 나온 걸로 새로 사요', axes: { time: 2, tone: 1 } }
        ]
      },
      {
        question: '아끼는 물건은 언제 꺼내 쓰세요?',
        note: '',
        options: [
          { text: '아낄수록 낡아요, 매일 써요', axes: { daily: 2 } },
          { text: '자리에 따라 골라서 써요', axes: { daily: 0 } },
          { text: '정말 특별한 날에만요', axes: { daily: -2, tone: -1 } }
        ]
      },
      {
        question: '둘 중 하나만 고른다면?',
        note: '고민되겠지만 하나만요',
        options: [
          { text: '한 사람이 40시간 손으로 만든 것', axes: { time: -2, craft: -2 } },
          { text: '처음 보는 방식으로 만든 것', axes: { time: 2, craft: 1 } }
        ]
      },
      {
        question: '여행 짐 쌀 때 어느 쪽에 가까우세요?',
        note: '',
        options: [
          { text: '가방 하나에 최소한만', axes: { tone: -1, daily: 2, structure: 1 } },
          { text: '상황별로 다 챙겨 가요', axes: { craft: 1, daily: -1, tone: 1 } }
        ]
      },
      {
        question: '길에서 옷 잘 입은 사람을 봤어요. 먼저 눈에 들어온 건?',
        note: '',
        options: [
          { text: '옷의 실루엣과 핏', axes: { craft: 2, structure: 2 } },
          { text: '신발이나 가방의 마감', axes: { craft: -2, logo: -1 } },
          { text: '색을 맞춘 방식', axes: { tone: 1 } },
          { text: '설명하기 어려운 분위기', axes: { time: 1, logo: -1, structure: -1 } }
        ]
      },
      {
        question: '평소 옷 입을 때 더 신경 쓰는 쪽은?',
        note: '',
        options: [
          { text: '어디에 있어도 어색하지 않게', axes: { time: -2, tone: -1 } },
          { text: '나답게 보이게', axes: { time: 1, logo: -1 } }
        ]
      },
      {
        question: '나에게 좋은 물건이란?',
        note: '마지막 질문이에요',
        options: [
          { text: '오래 곁에 두게 되는 것', axes: { time: -2, daily: 1 } },
          { text: '나를 설명해 주는 것', axes: { logo: 2 } },
          { text: '볼 때마다 기분이 좋아지는 것', axes: { tone: 2, daily: -1 } },
          { text: '남들이 잘 안 가진 것', axes: { time: 2, logo: -2 } }
        ]
      },
      {
        question: '옷을 고를 때 어느 쪽에 손이 가세요?',
        note: '',
        options: [
          { text: '몸에 부드럽게 감기는 옷', axes: { structure: -2 } },
          { text: '어깨와 허리 라인이 딱 잡힌 옷', axes: { structure: 2, craft: 1 } }
        ]
      },
      {
        question: '하루 종일 입고 나니 옷이 구겨졌어요.',
        note: '',
        options: [
          { text: '구김도 그 옷의 표정이죠', axes: { structure: -2, craft: -1, daily: 1 } },
          { text: '다려서 반듯하게 만들어요', axes: { structure: 2, daily: -1 } }
        ]
      },
      {
        question: '방에 하나만 둘 수 있다면?',
        note: '',
        options: [
          { text: '푹 파묻히는 둥근 소파', axes: { structure: -2, daily: 1 } },
          { text: '선이 살아있는 각진 의자', axes: { structure: 2, tone: -1 } },
          { text: '손때 묻은 오래된 나무 가구', axes: { time: -2, craft: -1 } },
          { text: '처음 보는 형태의 오브제', axes: { time: 2, structure: 1, tone: 1 } }
        ]
      }
    ];

    const AXIS_INFO = {
      logo:  { low: '로고 없이 조용한 쪽',   high: '한눈에 알아보는 쪽' },
      craft: { low: '가죽과 공예에 끌리는 쪽', high: '옷과 실루엣에 끌리는 쪽' },
      time:  { low: '변하지 않는 것을 믿는 쪽', high: '새로운 시도에 끌리는 쪽' },
      tone:  { low: '색을 덜어내는 쪽',      high: '색을 즐기는 쪽' },
      daily: { low: '특별한 날을 위해 아끼는 쪽', high: '매일 곁에 두는 쪽' },
      structure: { low: '부드럽게 흐르는 쪽',    high: '선이 또렷한 쪽' }
    };

    let currentMode = 'quiz';
    let quizIndex = 0;
    let axisScores = { logo: 0, craft: 0, time: 0, tone: 0, daily: 0, structure: 0 };

    const MOOD_LABELS = {
      classic: '클래식', modern: '모던', bold: '화려함', minimal: '미니멀', edgy: '아방가르드'
    };

    const quizView = document.getElementById('quizView');
    const resultView = document.getElementById('resultView');
    const browseView = document.getElementById('browseView');
    const quizProgress = document.getElementById('quizProgress');
    const quizCard = document.getElementById('quizCard');
    const browseGrid = document.getElementById('browseGrid');
    const detailOverlay = document.getElementById('detailOverlay');
    const detailCard = document.getElementById('detailCard');

    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      if (mode === 'quiz') {
        browseView.style.display = 'none';
        if (quizIndex >= QUIZ_QUESTIONS.length) {
          resetQuiz();
        } else {
          quizView.style.display = 'block';
          resultView.style.display = 'none';
        }
      } else {
        quizView.style.display = 'none';
        resultView.style.display = 'none';
        browseView.style.display = 'block';
        renderBrowse();
      }
    }

    function renderQuiz() {
      quizProgress.innerHTML = QUIZ_QUESTIONS.map((_, i) => {
        const cls = i < quizIndex ? 'done' : (i === quizIndex ? 'current' : '');
        return `<div class="quiz-dot ${cls}"></div>`;
      }).join('');

      const q = QUIZ_QUESTIONS[quizIndex];
      quizCard.innerHTML = `
        <div class="quiz-question">${q.question}</div>
        ${q.note ? `<div class="quiz-note">${q.note}</div>` : ''}
        <div class="quiz-options">
          ${q.options.map((opt, i) => `<div class="quiz-option" data-opt="${i}">${opt.swatch ? `<span class="opt-swatch" style="background:${opt.swatch}"></span>` : ''}${opt.text}</div>`).join('')}
        </div>
      `;
    }

    function answerQuiz(optIndex) {
      const q = QUIZ_QUESTIONS[quizIndex];
      if (!q) return;
      const selected = q.options[optIndex];
      if (!selected) return;
      Object.entries(selected.axes).forEach(([k, v]) => { axisScores[k] += v; });

      quizIndex++;
      if (quizIndex < QUIZ_QUESTIONS.length) {
        renderQuiz();
      } else {
        showResult();
      }
    }

    function showResult() {
      quizView.style.display = 'none';

      const KEYS = ['logo', 'craft', 'time', 'tone', 'daily', 'structure'];
      const range = {};
      KEYS.forEach(k => {
        let lo = 0, hi = 0;
        QUIZ_QUESTIONS.forEach(q => {
          const vals = q.options.map(o => o.axes[k] || 0);
          lo += Math.min(...vals);
          hi += Math.max(...vals);
        });
        range[k] = { lo, hi };
      });

      const norm = {};
      KEYS.forEach(k => {
        const { lo, hi } = range[k];
        const ratio = hi === lo ? 0.5 : (axisScores[k] - lo) / (hi - lo);
        norm[k] = ratio * 4 - 2;
      });

      const ranked = BRANDS.map(b => {
        const dist = Math.sqrt(KEYS.reduce((sum, k) => sum + Math.pow(norm[k] - b.axes[k], 2), 0));
        return { brand: b, dist };
      }).sort((a, b) => a.dist - b.dist);

      const pick = ranked[0].brand;
      const runnerUps = ranked.slice(1, 3).map(r => r.brand);

      const topAxis = KEYS.map(k => ({ k, v: norm[k] }))
        .sort((a, b) => Math.abs(b.v) - Math.abs(a.v))[0];
      const profile = topAxis.v === 0
        ? '어느 쪽으로도 치우치지 않는'
        : (topAxis.v < 0 ? AXIS_INFO[topAxis.k].low : AXIS_INFO[topAxis.k].high);

      resultView.innerHTML = `
        <div class="result-card accent-top" style="--accent-c:${pick.accent}">
          <div class="brand-caption" style="color:${pick.accent}">${pick.category} · ${pick.city} ${pick.year}</div>
          <div class="result-label">당신은 ${profile}</div>
          <div class="brand-latin">${pick.name}</div>
          <div class="brand-kr">${pick.kr}</div>
          <div class="result-tagline">${pick.tagline}</div>
          <div class="accent-chip"><i></i>${pick.accentName}</div>
          <div class="result-section">
            <h4>헤리티지</h4>
            <p>${pick.heritage}</p>
          </div>
          <div class="result-section">
            <h4>디자인 철학</h4>
            <p>${pick.philosophy}</p>
          </div>
          <div class="result-section">
            <h4>시그니처 아이템</h4>
            <p>${pick.signature}</p>
          </div>
          <div class="result-section">
            <h4>가까운 브랜드</h4>
            <p class="runner-ups">${runnerUps.map(b => `${b.name} · ${b.kr}`).join('<br>')}</p>
          </div>
          <div class="result-actions">
            <button class="share-btn" id="shareBtn" data-brand="${pick.kr}">결과 공유하기</button>
            <button class="retry-btn" id="retryBtn">다시 진단하기</button>
          </div>
        </div>
      `;
      resultView.style.display = 'block';
    }

    function resetQuiz() {
      quizIndex = 0;
      axisScores = { logo: 0, craft: 0, time: 0, tone: 0, daily: 0, structure: 0 };
      resultView.style.display = 'none';
      quizView.style.display = 'block';
      renderQuiz();
    }

    function renderBrowse() {
      browseGrid.innerHTML = BRANDS.map((b, i) => `
        <div class="brand-card accent-top" data-brand="${i}" style="--accent-c:${b.accent}">
          <div class="brand-caption" style="color:${b.accent}">${b.city} ${b.year}</div>
          <div class="brand-latin">${b.name}</div>
          <div class="brand-kr">${b.kr} · ${b.moods.map(m => MOOD_LABELS[m]).join(' · ')}</div>
          <div class="accent-chip"><i></i>${b.accentName}</div>
        </div>
      `).join('');
    }

    function openDetail(brandIdx) {
      const b = BRANDS[brandIdx];
      detailCard.style.setProperty("--accent-c", b.accent);
      detailCard.classList.add("accent-top");
      detailCard.innerHTML = `
        <button class="detail-close" id="detailCloseBtn">×</button>
        <div class="brand-caption" style="color:${b.accent}">${b.category} · ${b.city} ${b.year}</div>
        <div class="brand-latin">${b.name}</div>
        <div class="brand-kr">${b.kr}</div>
        <div class="result-tagline">${b.tagline}</div>
        <div class="accent-chip"><i></i>${b.accentName}</div>
        <div class="result-section">
          <h4>헤리티지</h4>
          <p>${b.heritage}</p>
        </div>
        <div class="result-section">
          <h4>디자인 철학</h4>
          <p>${b.philosophy}</p>
        </div>
        <div class="result-section">
          <h4>시그니처 아이템</h4>
          <p>${b.signature}</p>
        </div>
      `;
      detailOverlay.classList.add('open');
    }

    function closeDetail() {
      detailOverlay.classList.remove('open');
    }

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => switchMode(btn.dataset.mode));
    });

    quizCard.addEventListener('click', (e) => {
      const opt = e.target.closest('[data-opt]');
      if (opt) answerQuiz(Number(opt.dataset.opt));
    });

    async function shareResult(btn) {
      const brand = btn.dataset.brand;
      const url = location.href.split('#')[0];
      const text = `나와 가장 가까운 브랜드는 ${brand}였어요. 당신의 브랜드는?`;
      const label = btn.textContent;

      if (navigator.share) {
        try {
          await navigator.share({ title: 'LUXE MATCH', text, url });
          return;
        } catch (err) {
          if (err.name === 'AbortError') return;
        }
      }

      try {
        await navigator.clipboard.writeText(`${text}\n${url}`);
        btn.textContent = '링크 복사됨';
      } catch (err) {
        btn.textContent = '복사 실패';
      }
      btn.disabled = true;
      setTimeout(() => { btn.textContent = label; btn.disabled = false; }, 2000);
    }

    resultView.addEventListener('click', (e) => {
      if (e.target.id === 'retryBtn') resetQuiz();
      if (e.target.id === 'shareBtn') shareResult(e.target);
    });

    browseGrid.addEventListener('click', (e) => {
      const card = e.target.closest('[data-brand]');
      if (card) openDetail(Number(card.dataset.brand));
    });

    detailOverlay.addEventListener('click', (e) => {
      if (e.target === detailOverlay || e.target.id === 'detailCloseBtn') closeDetail();
    });

    renderQuiz();
  </script>
</body>
</html>
