<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POMODORO</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── 전역 변수 (todo 앱과 톤 통일) ── */
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --accent: #4f8ef7;       /* 집중 모드 색상 */
      --accent-dim: #3a72d4;
      --rest: #5dcaa5;         /* 휴식 모드 색상 */
      --rest-dim: #43a682;
      --text: #f0f0f0;
      --text-muted: #666;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 16px 100px;
      transition: background 0.4s;
    }

    .container { width: 100%; max-width: 420px; text-align: center; }

    /* ── 헤더 ── */
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      letter-spacing: 3px;
      line-height: 1;
      color: var(--accent);
      transition: color 0.4s;
    }
    .header .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

    /* ── 모드 전환 탭 ── */
    .mode-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 28px 0;
    }
    .mode-btn {
      background: transparent;
      border: 1.5px solid var(--surface2);
      border-radius: 99px;
      padding: 7px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active.focus { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.12); }
    .mode-btn.active.rest { border-color: var(--rest); color: var(--rest); background: rgba(93,202,165,0.12); }

    /* ── 원형 타이머 ── */
    .timer-circle-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 32px;
    }
    .timer-circle-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 10; }
    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.4s;
    }
    .timer-display {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .time-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      letter-spacing: 2px;
      color: var(--text);
    }
    .session-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── 시간 입력 (정지 상태에서만 보임) ── */
    .time-input-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .time-input-group { text-align: center; }
    .time-input-group label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 6px; }
    .time-input-group input {
      width: 64px;
      background: var(--surface);
      border: 1.5px solid var(--surface2);
      border-radius: var(--radius);
      padding: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      color: var(--text);
      text-align: center;
      outline: none;
    }
    .time-input-group input:focus { border-color: var(--accent); }

    /* ── 컨트롤 버튼 ── */
    .controls { display: flex; justify-content: center; gap: 12px; }
    .ctrl-btn {
      border: none;
      border-radius: var(--radius);
      padding: 14px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .ctrl-btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-secondary {
      background: var(--surface);
      color: var(--text-muted);
      border: 1.5px solid var(--surface2);
    }
    .btn-secondary:hover { border-color: #333; color: var(--text); }

    /* 휴식 모드일 때 버튼 색 변경 */
    body.rest-mode .header h1 { color: var(--rest); }
    body.rest-mode .ring-progress { stroke: var(--rest); }
    body.rest-mode .btn-primary { background: var(--rest); }
    body.rest-mode .btn-primary:hover { background: var(--rest-dim); }

    /* 완료 시 펄스 애니메이션 */
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.08); }
    }
    .timer-display.pulse { animation: pulse 0.6s ease-in-out 2; }

    .back-link {
      display: inline-block;
      margin-top: 36px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>POMODORO</h1>
      <p class="subtitle">집중하고, 쉬고, 반복하기</p>
    </div>

    <!-- 모드 전환 -->
    <div class="mode-row">
      <button class="mode-btn focus active" data-mode="focus">집중</button>
      <button class="mode-btn rest" data-mode="rest">휴식</button>
    </div>

    <!-- 원형 타이머 -->
    <div class="timer-circle-wrap">
      <svg viewBox="0 0 280 280">
        <circle class="ring-bg" cx="140" cy="140" r="125"></circle>
        <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="125"
                stroke-dasharray="785.4" stroke-dashoffset="0"></circle>
      </svg>
      <div class="timer-display" id="timerDisplay">
        <div class="time-text" id="timeText">25:00</div>
        <div class="session-label" id="sessionLabel">집중 시간</div>
      </div>
    </div>

    <!-- 시간 직접 설정 (멈춰있을 때만 노출) -->
    <div class="time-input-row" id="timeInputRow">
      <div class="time-input-group">
        <label>분</label>
        <input type="number" id="minInput" min="0" max="180" value="25">
      </div>
      <div class="time-input-group">
        <label>초</label>
        <input type="number" id="secInput" min="0" max="59" value="0">
      </div>
    </div>

    <!-- 컨트롤 버튼 -->
    <div class="controls">
      <button class="ctrl-btn btn-primary" id="startPauseBtn">시작</button>
      <button class="ctrl-btn btn-secondary" id="resetBtn">리셋</button>
    </div>

    <a href="../" class="back-link">← 앱 목록으로 돌아가기</a>
  </div>

  <script>
    /* ════════════════════════════════
       1. 상태 변수
       ════════════════════════════════ */
    const CIRCUMFERENCE = 2 * Math.PI * 125; // 원 둘레 (약 785.4)

    let currentMode = 'focus';     // 'focus' | 'rest'
    let totalSeconds = 25 * 60;    // 설정된 총 시간 (초)
    let remainingSeconds = totalSeconds;
    let timerId = null;            // setInterval ID
    let isRunning = false;

    /* ════════════════════════════════
       2. DOM 참조
       ════════════════════════════════ */
    const timeText = document.getElementById('timeText');
    const sessionLabel = document.getElementById('sessionLabel');
    const ringProgress = document.getElementById('ringProgress');
    const timerDisplay = document.getElementById('timerDisplay');
    const minInput = document.getElementById('minInput');
    const secInput = document.getElementById('secInput');
    const timeInputRow = document.getElementById('timeInputRow');
    const startPauseBtn = document.getElementById('startPauseBtn');
    const resetBtn = document.getElementById('resetBtn');

    ringProgress.style.strokeDasharray = CIRCUMFERENCE;

    /* ════════════════════════════════
       3. 화면 업데이트 함수들
       ════════════════════════════════ */

    // 초를 "MM:SS" 형태로 변환
    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // 시계 숫자 + 진행 원 업데이트
    function updateDisplay() {
      timeText.textContent = formatTime(remainingSeconds);
      const progress = remainingSeconds / totalSeconds; // 1 → 0으로 감소
      ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
    }

    // 집중/휴식 모드에 맞춰 화면 색, 라벨 변경
    function applyModeStyle() {
      sessionLabel.textContent = currentMode === 'focus' ? '집중 시간' : '휴식 시간';
      document.body.classList.toggle('rest-mode', currentMode === 'rest');
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === currentMode);
      });
    }

    /* ════════════════════════════════
       4. 타이머 핵심 로직
       ════════════════════════════════ */

    // 시작 ↔ 일시정지 토글
    function toggleStartPause() {
      if (isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    }

    function startTimer() {
      // 처음 시작하는 거라면, 입력값으로 totalSeconds 세팅
      if (remainingSeconds === totalSeconds && !timerId) {
        const mins = parseInt(minInput.value) || 0;
        const secs = parseInt(secInput.value) || 0;
        totalSeconds = mins * 60 + secs;
        if (totalSeconds <= 0) return; // 0초면 시작 안 함
        remainingSeconds = totalSeconds;
      }

      isRunning = true;
      startPauseBtn.textContent = '일시정지';
      timeInputRow.style.display = 'none'; // 진행 중엔 입력창 숨김

      timerId = setInterval(() => {
        remainingSeconds--;
        updateDisplay();

        if (remainingSeconds <= 0) {
          finishSession();
        }
      }, 1000);
    }

    function pauseTimer() {
      isRunning = false;
      startPauseBtn.textContent = '계속하기';
      clearInterval(timerId);
      timerId = null;
    }

    function resetTimer() {
      clearInterval(timerId);
      timerId = null;
      isRunning = false;
      startPauseBtn.textContent = '시작';
      timeInputRow.style.display = 'flex';

      const mins = parseInt(minInput.value) || 0;
      const secs = parseInt(secInput.value) || 0;
      totalSeconds = mins * 60 + secs;
      remainingSeconds = totalSeconds;
      updateDisplay();
    }

    // 시간이 다 됐을 때
    function finishSession() {
      clearInterval(timerId);
      timerId = null;
      isRunning = false;
      startPauseBtn.textContent = '시작';
      timeInputRow.style.display = 'flex';

      // 펄스 애니메이션 + 알림음
      timerDisplay.classList.add('pulse');
      setTimeout(() => timerDisplay.classList.remove('pulse'), 1200);
      playBeep();

      // 자동으로 반대 모드로 전환 (집중→휴식, 휴식→집중)
      switchMode(currentMode === 'focus' ? 'rest' : 'focus');
    }

    // 간단한 알림음 (Web Audio API, 외부 파일 없이 재생)
    function playBeep() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start();
      osc.stop(ctx.currentTime + 0.5);
    }

    /* ════════════════════════════════
       5. 모드 전환
       ════════════════════════════════ */
    function switchMode(mode) {
      currentMode = mode;
      // 모드별 기본 시간 (집중 25분 / 휴식 5분)으로 입력칸 갱신
      if (mode === 'focus') {
        minInput.value = 25;
        secInput.value = 0;
      } else {
        minInput.value = 5;
        secInput.value = 0;
      }
      applyModeStyle();
      resetTimer();
    }

    /* ════════════════════════════════
       6. 이벤트 리스너
       ════════════════════════════════ */
    startPauseBtn.addEventListener('click', toggleStartPause);
    resetBtn.addEventListener('click', resetTimer);

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => switchMode(btn.dataset.mode));
    });

    // 입력값 바꾸면 (정지 상태일 때만) 화면에 바로 반영
    [minInput, secInput].forEach(input => {
      input.addEventListener('input', () => {
        if (!isRunning) {
          const mins = parseInt(minInput.value) || 0;
          const secs = parseInt(secInput.value) || 0;
          totalSeconds = mins * 60 + secs;
          remainingSeconds = totalSeconds;
          updateDisplay();
        }
      });
    });

    /* ════════════════════════════════
       7. 초기 실행
       ════════════════════════════════ */
    updateDisplay();
  </script>
</body>
</html>
