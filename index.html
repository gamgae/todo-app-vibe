<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Apps</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 16px 100px;
    }
    .container { width: 100%; max-width: 560px; }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      letter-spacing: 3px;
      color: #4f8ef7;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 40px; }
    .app-list { display: flex; flex-direction: column; gap: 12px; }
    .app-card {
      display: block;
      background: #1a1a1a;
      border: 1.5px solid #242424;
      border-radius: 12px;
      padding: 20px;
      text-decoration: none;
      color: #f0f0f0;
      transition: border-color 0.2s, transform 0.1s;
    }
    .app-card:hover { border-color: #4f8ef7; transform: translateY(-2px); }
    .app-name { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .app-desc { font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MY APPS</h1>
    <p class="subtitle">바이브코딩으로 만든 미니 앱 모음</p>
    <div class="app-list">
      <a href="todo_app/" class="app-card">
        <div class="app-name">TODO</div>
        <div class="app-desc">카테고리, 완료일자, 인라인 수정이 되는 할 일 관리 앱</div>
      </a>
      <a href="pomodoro_app/" class="app-card">
        <div class="app-name">POMODORO</div>
        <div class="app-desc">집중/휴식 시간을 직접 설정할 수 있는 포모도로 타이머</div>
      </a>
      <a href="coffee_app/" class="app-card">
        <div class="app-name">COFFEE PICK</div>
        <div class="app-desc">단순 뽑기, 룰렛 휠, 사다리타기로 커피 당첨자 정하기</div>
      </a>
      <a href="luxe_match_app/" class="app-card">
        <div class="app-name">LUXE MATCH</div>
        <div class="app-desc">스타일 진단과 브랜드 탐색으로 나에게 맞는 명품을 찾기</div>
      </a>
      <!-- 새 앱 만들면 여기에 카드 하나씩 추가하면 돼요 -->
    </div>
  </div>
</body>
</html>
