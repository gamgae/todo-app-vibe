<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── 전역 변수 ── */
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --accent: #4f8ef7;        /* 파란색 계열로 변경 */
      --accent-dim: #3a72d4;
      --accent-light: #1a3a6e;
      --text: #f0f0f0;
      --text-muted: #666;
      --done: #1e2530;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 16px 100px;
    }

    .container { width: 100%; max-width: 560px; }

    /* ── 헤더 ── */
    .header { margin-bottom: 40px; }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      letter-spacing: 4px;
      line-height: 1;
      color: var(--accent);
    }
    .header .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
    .header .subtitle span { color: var(--accent); font-weight: 500; }

    /* ── 카테고리 + 입력 폼 영역 ── */
    .input-area { margin-bottom: 28px; }

    /* 카테고리 선택 행 */
    .category-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    /* 카테고리 뱃지 버튼 */
    .cat-btn {
      background: transparent;
      border: 1.5px solid var(--surface2);
      border-radius: 99px;
      padding: 5px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .cat-btn.selected {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }
    /* 카테고리 색상 점 */
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* 입력 행 */
    .input-row { display: flex; gap: 10px; }
    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--surface2);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input::placeholder { color: var(--text-muted); }
    .input-row input:focus { border-color: var(--accent); }

    /* 추가 버튼 — 파란색 */
    .input-row button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      line-height: 1;
    }
    .input-row button:hover { background: var(--accent-dim); }
    .input-row button:active { transform: scale(0.95); }

    /* ── 필터 탭 ── */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filters { display: flex; gap: 6px; }
    .filters button {
      background: transparent;
      border: 1.5px solid var(--surface2);
      border-radius: 99px;
      padding: 6px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filters button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 500;
    }

    /* 카테고리 필터 드롭다운 */
    .cat-filter-wrap { margin-left: auto; }
    .cat-filter-wrap select {
      background: var(--surface);
      border: 1.5px solid var(--surface2);
      border-radius: 99px;
      padding: 6px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      outline: none;
    }

    /* ── 할 일 목록 ── */
    .todo-list { display: flex; flex-direction: column; gap: 10px; }

    .empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 48px 0;
    }

    /* ── 할 일 아이템 카드 ── */
    .todo-item {
      background: var(--surface);
      border: 1.5px solid var(--surface2);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.2s, opacity 0.2s;
    }
    /* 추가 애니메이션: 퐁퐁 뛰기 */
    .todo-item.bounce-in {
      animation: bounceIn 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }
    .todo-item:hover { border-color: #333; }

    /* 완료된 아이템 */
    .todo-item.done {
      background: var(--done);
      border-color: var(--done);
      opacity: 0.7;
    }
    /* 완료 애니메이션: 퐁퐁 */
    .todo-item.bounce-done {
      animation: bounceDone 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    /* ── 커스텀 체크박스 ── */
    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--surface2);
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 13px;
      margin-top: 1px;
    }
    .todo-item.done .checkbox {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .checkbox:hover { border-color: var(--accent); }

    /* 텍스트 + 메타 묶음 */
    .todo-body { flex: 1; min-width: 0; }

    /* 카테고리 뱃지 (아이템 위) */
    .item-cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      margin-bottom: 5px;
      font-weight: 500;
    }

    /* 할 일 텍스트 — 더블클릭 수정 가능 */
    .todo-text {
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
      cursor: text;
      border-radius: 4px;
      padding: 1px 3px;
      margin: 0 -3px;
      transition: background 0.15s;
      display: block;
    }
    .todo-text:hover { background: rgba(255,255,255,0.04); }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* 인라인 편집 input */
    .edit-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      padding: 3px 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
    }

    /* 완료 일자 */
    .done-date {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 삭제 버튼 */
    .delete-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .todo-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #ff5a5a; }

    /* ── 하단 ── */
    .footer { margin-top: 28px; text-align: right; }
    .clear-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: #ff5a5a; }

    /* ── 애니메이션 키프레임 ── */

    /* 추가 시: 아래서 퐁 튀어오르기 */
    @keyframes bounceIn {
      0%   { opacity: 0; transform: translateY(12px) scale(0.97); }
      50%  { opacity: 1; transform: translateY(-5px) scale(1.02); }
      75%  { transform: translateY(3px) scale(0.99); }
      100% { transform: translateY(0) scale(1); }
    }

    /* 완료 시: 제자리에서 퐁퐁 */
    @keyframes bounceDone {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.04) translateY(-3px); }
      60%  { transform: scale(0.97) translateY(2px); }
      80%  { transform: scale(1.01) translateY(-1px); }
      100% { transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>TODO</h1>
    <p class="subtitle">남은 할 일 <span id="remaining">0</span>개</p>
  </div>

  <!-- 카테고리 선택 + 입력 폼 -->
  <div class="input-area">
    <!-- 카테고리 선택 행 -->
    <div class="category-row" id="categoryRow"></div>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="새로운 할 일을 입력하세요..." maxlength="100" />
      <button id="addBtn" title="추가">+</button>
    </div>
  </div>

  <!-- 필터 탭 + 카테고리 드롭다운 -->
  <div class="filter-row">
    <div class="filters">
      <button class="active" data-filter="all">전체</button>
      <button data-filter="active">진행중</button>
      <button data-filter="done">완료</button>
    </div>
    <div class="cat-filter-wrap">
      <select id="catFilterSelect">
        <option value="all">모든 카테고리</option>
      </select>
    </div>
  </div>

  <div class="todo-list" id="todoList"></div>

  <div class="footer">
    <button class="clear-btn" id="clearDoneBtn">완료된 항목 삭제</button>
  </div>

</div>
<script>
  /* ════════════════════════════════
     0. 카테고리 정의
     ════════════════════════════════ */

  // 카테고리 목록: id, 이름, 색상
  const CATEGORIES = [
    { id: 'personal', label: '개인',   color: '#4f8ef7' },
    { id: 'work',     label: '업무',   color: '#f7794f' },
    { id: 'shopping', label: '쇼핑',   color: '#f7c94f' },
    { id: 'health',   label: '건강',   color: '#4fd17a' },
    { id: 'etc',      label: '기타',   color: '#a78bfa' },
  ];

  // 카테고리 id → 객체 빠른 조회
  const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

  /* ════════════════════════════════
     1. 상태 관리 & localStorage
     ════════════════════════════════ */

  const STORAGE_KEY = 'my-todos-v2';

  function loadTodos() {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }
  function saveTodos() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  let todos = loadTodos();
  let currentFilter = 'all';      // 상태 필터
  let currentCat    = 'all';      // 카테고리 필터
  let selectedCat   = CATEGORIES[0].id;  // 새 항목에 붙을 카테고리 (기본: 개인)

  /* ════════════════════════════════
     2. CRUD 함수
     ════════════════════════════════ */

  function addTodo(text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    todos.unshift({
      id: Date.now(),
      text: trimmed,
      done: false,
      category: selectedCat,   // 선택된 카테고리 저장
      doneAt: null              // 완료 일시 (완료 시 채워짐)
    });
    saveTodos();
    render(true); // true = 첫 번째 아이템에 bounceIn 적용
  }

  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    todo.done = !todo.done;
    // 완료 시 현재 시각 기록, 취소 시 초기화
    todo.doneAt = todo.done ? new Date().toISOString() : null;
    saveTodos();
    render(false, id); // id 전달 → 해당 아이템에 bounceDone 적용
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    saveTodos();
    render();
  }

  function clearDone() {
    todos = todos.filter(t => !t.done);
    saveTodos();
    render();
  }

  // 인라인 텍스트 수정 저장
  function updateTodoText(id, newText) {
    const trimmed = newText.trim();
    if (!trimmed) return; // 빈 텍스트면 무시
    const todo = todos.find(t => t.id === id);
    if (todo) todo.text = trimmed;
    saveTodos();
    render();
  }

  /* ════════════════════════════════
     3. 유틸 함수
     ════════════════════════════════ */

  // XSS 방지
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // 완료 일시 포맷: "2025. 6. 3. 오후 2:30"
  function formatDate(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    return d.toLocaleString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  /* ════════════════════════════════
     4. 렌더링
     ════════════════════════════════ */

  // bounceNewId: 새로 추가된 아이템 id (애니메이션용)
  // bounceDoneId: 완료 토글된 아이템 id (애니메이션용)
  function render(isNew = false, bounceDoneId = null) {
    renderCategoryRow();
    renderCatFilterSelect();
    renderList(isNew, bounceDoneId);
    document.getElementById('remaining').textContent = todos.filter(t => !t.done).length;
  }

  /* 카테고리 선택 행 렌더 */
  function renderCategoryRow() {
    const row = document.getElementById('categoryRow');
    row.innerHTML = CATEGORIES.map(cat => `
      <button class="cat-btn ${selectedCat === cat.id ? 'selected' : ''}"
              data-cat-select="${cat.id}">
        <span class="cat-dot" style="background:${cat.color}"></span>
        ${cat.label}
      </button>
    `).join('');
  }

  /* 카테고리 필터 드롭다운 옵션 동기화 */
  function renderCatFilterSelect() {
    const sel = document.getElementById('catFilterSelect');
    const prev = sel.value;
    sel.innerHTML = '<option value="all">모든 카테고리</option>' +
      CATEGORIES.map(c => `<option value="${c.id}">${c.label}</option>`).join('');
    sel.value = prev; // 선택값 유지
  }

  /* 할 일 목록 렌더 */
  function renderList(isNew, bounceDoneId) {
    const list = document.getElementById('todoList');

    // 상태 필터
    let filtered = todos.filter(t => {
      if (currentFilter === 'active') return !t.done;
      if (currentFilter === 'done')   return t.done;
      return true;
    });
    // 카테고리 필터
    if (currentCat !== 'all') {
      filtered = filtered.filter(t => t.category === currentCat);
    }

    if (filtered.length === 0) {
      list.innerHTML = '<p class="empty">할 일이 없어요 ✦</p>';
      return;
    }

    list.innerHTML = filtered.map((todo, idx) => {
      const cat = CAT_MAP[todo.category] || CAT_MAP['etc'];

      // 애니메이션 클래스 결정
      let animClass = '';
      if (isNew && idx === 0)           animClass = 'bounce-in';
      if (bounceDoneId === todo.id)     animClass = 'bounce-done';

      return `
      <div class="todo-item ${todo.done ? 'done' : ''} ${animClass}" data-id="${todo.id}">

        <!-- 체크박스 -->
        <div class="checkbox" data-action="toggle">
          ${todo.done ? '✓' : ''}
        </div>

        <!-- 텍스트 + 메타 묶음 -->
        <div class="todo-body">
          <!-- 카테고리 뱃지 -->
          <span class="item-cat-badge"
                style="background:${cat.color}22; color:${cat.color};">
            <span class="cat-dot" style="background:${cat.color};"></span>
            ${cat.label}
          </span>

          <!-- 할 일 텍스트: 더블클릭 시 편집 모드 -->
          <span class="todo-text" data-action="edit-start"
                title="더블클릭하면 수정할 수 있어요">
            ${escapeHtml(todo.text)}
          </span>

          <!-- 완료 일자: 완료된 경우에만 표시 -->
          ${todo.done && todo.doneAt ? `
            <div class="done-date">
              ✓ 완료: ${formatDate(todo.doneAt)}
            </div>` : ''}
        </div>

        <!-- 삭제 버튼 -->
        <button class="delete-btn" data-action="delete" title="삭제">×</button>

      </div>`;
    }).join('');
  }

  /* ════════════════════════════════
     5. 인라인 편집 진입/저장
     ════════════════════════════════ */

  // 편집 모드 진입: span → input으로 교체
  function startEdit(item, todoId) {
    const todo = todos.find(t => t.id === todoId);
    if (!todo || todo.done) return; // 완료된 항목은 수정 불가

    const span = item.querySelector('.todo-text');
    const input = document.createElement('input');
    input.className = 'edit-input';
    input.value = todo.text;
    span.replaceWith(input); // span을 input으로 교체
    input.focus();
    input.select(); // 전체 선택

    // Enter: 저장, Escape: 취소
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing) commitEdit(input, todoId);
      if (e.key === 'Escape') render(); // 취소 시 그냥 다시 렌더
    });
    // 포커스 잃으면 자동 저장
    input.addEventListener('blur', () => commitEdit(input, todoId));
  }

  // 편집 내용 저장
  function commitEdit(input, todoId) {
    updateTodoText(todoId, input.value);
  }

  /* ════════════════════════════════
     6. 이벤트 리스너
     ════════════════════════════════ */

  // 추가 버튼
  document.getElementById('addBtn').addEventListener('click', () => {
    const input = document.getElementById('todoInput');
    addTodo(input.value);
    input.value = '';
    input.focus();
  });

  // Enter로 추가 (IME 버그 방지)
  document.getElementById('todoInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.isComposing) document.getElementById('addBtn').click();
  });

  // 카테고리 선택 행 (이벤트 위임)
  document.getElementById('categoryRow').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-cat-select]');
    if (!btn) return;
    selectedCat = btn.dataset.catSelect;
    renderCategoryRow(); // 선택 표시만 업데이트
  });

  // 카테고리 필터 드롭다운
  document.getElementById('catFilterSelect').addEventListener('change', (e) => {
    currentCat = e.target.value;
    render();
  });

  // 할 일 목록 (이벤트 위임)
  document.getElementById('todoList').addEventListener('click', (e) => {
    const item = e.target.closest('.todo-item');
    if (!item) return;
    const id = Number(item.dataset.id);
    const action = e.target.dataset.action;

    if (action === 'toggle')     toggleTodo(id);
    if (action === 'delete')     deleteTodo(id);
  });

  // 더블클릭으로 편집 모드 진입
  document.getElementById('todoList').addEventListener('dblclick', (e) => {
    const item = e.target.closest('.todo-item');
    if (!item) return;
    if (e.target.dataset.action === 'edit-start') {
      startEdit(item, Number(item.dataset.id));
    }
  });

  // 상태 필터 탭
  document.querySelector('.filters').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });

  // 완료 항목 전체 삭제
  document.getElementById('clearDoneBtn').addEventListener('click', clearDone);

  /* ════════════════════════════════
     7. 초기 실행
     ════════════════════════════════ */
  render();
</script>
</body>
</html>
